<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pointwest — Engineering-Led Digital Transformation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@400;500;600;700;800&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Source Sans 3', sans-serif; background: #0B1628; color: #0B1628; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
  /* Remove default browser blue focus ring and tap highlight on all buttons/links */
  button { outline: none; -webkit-tap-highlight-color: transparent; }
  button:focus, button:focus-visible { outline: none; }
  a { -webkit-tap-highlight-color: transparent; }

  /* Tweaks panel */
  #tweaks-panel {
    display: none; position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    background: #fff; border: 1px solid #e2e8f0; border-radius: 16px;
    box-shadow: 0 8px 40px rgba(11,22,40,0.18); padding: 20px 24px; width: 280px;
    font-family: 'Source Sans 3', sans-serif;
  }
  #tweaks-panel.visible { display: block; }
  #tweaks-panel h3 { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 16px; color: #0B1628; }
  #tweaks-panel label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; margin-bottom: 6px; margin-top: 14px; }
  #tweaks-panel label:first-of-type { margin-top: 0; }
  .tweak-btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .tweak-btn { padding: 6px 12px; border-radius: 8px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-size: 12px; font-family: 'Source Sans 3', sans-serif; font-weight: 500; cursor: pointer; color: #334155; transition: all 0.15s; }
  .tweak-btn:hover { border-color: #3B5CF6; color: #3B5CF6; }
  .tweak-btn.active { background: #0B1628; border-color: #0B1628; color: #fff; }
  .tweak-divider { height: 1px; background: #f1f5f9; margin: 16px 0; }

  /* Hero animations — defined here (not inside React) so they never restart on re-render */
  @keyframes heroFloat {
    0%,100% { transform: scale(1.06) translateY(0px); }
    50%      { transform: scale(1.08) translateY(-14px); }
  }
  @keyframes heroReveal {
    from { opacity: 0; transform: translateX(60px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .hero-img-wrap  { animation: heroReveal 1.1s cubic-bezier(0.22,1,0.36,1) 0.2s both; }
  .hero-img-float { animation: heroFloat 8s ease-in-out infinite; }

</style>

<script type="application/json" id="speaker-notes">[]</script>
<meta name="ext-resource-dependency" content="uploads/pointwest-logo-colored.png" data-resource-id="pwLogoColored" />
<meta name="ext-resource-dependency" content="uploads/pointwest_logo_white.png" data-resource-id="pwLogoWhite" />
<template id="__bundler_thumbnail" data-bg-color="#0d2d52">
  <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0a2240"/><stop offset="100%" stop-color="#1B9ED4"/>
      </linearGradient>
    </defs>
    <rect width="120" height="80" fill="url(#bg)"/>
    <polygon points="22,48 32,28 42,48" fill="#1B9ED4" opacity="0.9"/>
    <polygon points="28,48 36,32 44,48" fill="#F08030" opacity="0.85"/>
    <rect x="50" y="34" width="56" height="5" rx="2" fill="white" opacity="0.9"/>
    <rect x="50" y="43" width="38" height="3" rx="1.5" fill="white" opacity="0.45"/>
    <rect x="50" y="58" width="30" height="10" rx="5" fill="#F08030"/>
  </svg>
</template>
</head>
<body>

<div id="root"></div>
<div id="tweaks-panel">
  <h3>Tweaks</h3>
  <label>Visual Variant</label>
  <div class="tweak-btn-group" id="variant-btns">
    <button class="tweak-btn active" data-val="precision" onclick="setVariant('precision')">Precision</button>
    <button class="tweak-btn" data-val="authority" onclick="setVariant('authority')">Authority</button>
    <button class="tweak-btn" data-val="forward" onclick="setVariant('forward')">Forward</button>
  </div>
  <div class="tweak-divider"></div>
  <label>Accent Color</label>
  <div class="tweak-btn-group" id="accent-btns">
    <button class="tweak-btn" data-val="blue" onclick="setAccent('blue')">Brand Blue</button>
    <button class="tweak-btn active" data-val="orange" onclick="setAccent('orange')">Brand Orange</button>
    <button class="tweak-btn" data-val="teal" onclick="setAccent('teal')">Teal</button>
  </div>
  <div class="tweak-divider"></div>
  <label>Nav Style</label>
  <div class="tweak-btn-group" id="nav-btns">
    <button class="tweak-btn active" data-val="light" onclick="setNav('light')">Light</button>
    <button class="tweak-btn" data-val="dark" onclick="setNav('dark')">Dark</button>
  </div>
</div>

<script type="text/babel">

const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "variant": "forward",
  "accent": "blue",
  "navStyle": "dark"
}/*EDITMODE-END*/;

const ACCENT_COLORS = {
  blue: { main: 'oklch(62% 0.16 220)', light: 'oklch(96% 0.05 220)', dark: 'oklch(40% 0.16 220)', hex: '#1B9ED4', rgb: '27,158,212' },
  orange: { main: 'oklch(68% 0.17 50)', light: 'oklch(97% 0.05 50)', dark: 'oklch(50% 0.17 50)', hex: '#F08030', rgb: '240,128,48' },
  teal: { main: 'oklch(58% 0.15 195)', light: 'oklch(96% 0.04 195)', dark: 'oklch(38% 0.15 195)', hex: '#0E9B87', rgb: '14,155,135' }
};

// Brand orange — always used for buttons/icons regardless of accent
const ORANGE = { main: '#F08030', light: 'rgba(240,128,48,0.12)', dark: '#C0601A', rgb: '240,128,48' };

// ——— ICONS (simple SVG) ———
const ArrowRight = ({ size = 20, color = 'currentColor' }) =>
<svg width={size} height={size} viewBox="0 0 20 20" fill="none">
    <path d="M4 10h12M11 5l5 5-5 5" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />
  </svg>;

const ChevronDown = ({ size = 16 }) =>
<svg width={size} height={size} viewBox="0 0 16 16" fill="none">
    <path d="M4 6l4 4 4-4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
  </svg>;

const MenuIcon = () =>
<svg width="24" height="24" viewBox="0 0 24 24" fill="none">
    <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" />
  </svg>;

const CloseIcon = () =>
<svg width="24" height="24" viewBox="0 0 24 24" fill="none">
    <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" />
  </svg>;


// ——— LOGO ———
const PointwestLogo = ({ dark, height = 36 }) => {
  const textColor = dark ? '#ffffff' : '#0B1628';
  return (
    <svg height={height} viewBox="0 0 152 36" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ display: 'block' }}>
      {/* Mark: two overlapping triangles */}
      <polygon points="2,32 12,6 22,32" fill="#1B9ED4"/>
      <polygon points="10,32 19,10 28,32" fill="#F08030" opacity="0.92"/>
      {/* Wordmark */}
      <text x="34" y="26" fontFamily="'Barlow Semi Condensed', Arial, sans-serif" fontWeight="700" fontSize="19" fill={textColor} letterSpacing="-0.3">pointwest</text>
    </svg>
  );
};

// ——— NAV ———
function Nav({ variant, accent, navStyle }) {
  const [scrolled, setScrolled] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);
  const [activeDropdown, setActiveDropdown] = useState(null);
  const closeTimer = useRef(null);
  const ac = ACCENT_COLORS[accent];

  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  const isDark = navStyle === 'dark' || variant === 'authority' && !scrolled;
  const bg = scrolled ? isDark ? '#0B1628' : '#fff' : isDark ? 'rgba(11,22,40,0.95)' : 'rgba(255,255,255,0.96)';
  const textColor = isDark ? '#fff' : '#0B1628';
  const borderColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(11,22,40,0.07)';

  const navItems = [
  { label: 'What We Do', href: 'pages/Services.html', sub: [{label:'Data & AI',href:'pages/Services.html'},{label:'Cloud',href:'pages/Services.html'},{label:'Business Process',href:'pages/Services.html'},{label:'IT Operations',href:'pages/Services.html'},{label:'Platforms & Apps',href:'pages/Services.html'},{label:'Quality Engineering',href:'pages/Services.html'},{label:'Staffing',href:'pages/Services.html'}] },
  { label: 'Industries', href: 'pages/Industries.html', sub: [{label:'Consumer & Retail',href:'pages/Industries.html'},{label:'ICT',href:'pages/Industries.html'},{label:'Banking & Insurance',href:'pages/Industries.html'},{label:'Healthcare',href:'pages/Industries.html'},{label:'Public Sector',href:'pages/Industries.html'},{label:'Shipping & Logistics',href:'pages/Industries.html'},{label:'Transportation',href:'pages/Industries.html'},{label:'Utilities',href:'pages/Industries.html'}] },
  { label: 'What We Think', href: 'pages/Insights.html', sub: [{label:'Insights',href:'pages/Insights.html'},{label:'Success Stories',href:'pages/Success Stories.html'}] },
  { label: 'Who We Are', href: 'pages/About Us.html', sub: [{label:'About Us',href:'pages/About Us.html'},{label:'Careers',href:'pages/Careers.html'}] },
  { label: 'Careers', href: 'pages/Careers.html', sub: null }];


  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 1000,
      background: bg, backdropFilter: 'blur(16px)',
      borderBottom: `1px solid ${borderColor}`,
      transition: 'background 0.3s ease, border-color 0.3s ease'
    }}>
      <div style={{ maxWidth: 1280, margin: '0 auto', padding: '0 40px', display: 'flex', alignItems: 'center', height: 72, gap: 48 }}>
        {/* Logo */}
        <div style={{ display: 'flex', alignItems: 'center', flexShrink: 0, cursor: 'pointer' }} onClick={() => { window.location.href='#'; }}>
          <img
            src={isDark ? ((window.__resources && window.__resources.pwLogoWhite) || "uploads/pointwest_logo_white.png") : ((window.__resources && window.__resources.pwLogoColored) || "uploads/pointwest-logo-colored.png")}
            alt="Pointwest"
            onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling && (e.target.nextSibling.style.display = 'block'); }}
            style={{ height: 36, width: 'auto', display: 'block' }}
          />
          <span style={{ display: 'none', fontFamily: 'Barlow Semi Condensed', fontWeight: 700, fontSize: 20, color: isDark ? '#fff' : '#0B1628', letterSpacing: '-0.02em' }}>Pointwest</span>
        </div>

        {/* Desktop Nav */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 4, flex: 1 }}>
          {navItems.map((item) =>
          <div key={item.label} style={{ position: 'relative' }}
          onMouseEnter={() => { clearTimeout(closeTimer.current); item.sub && setActiveDropdown(item.label); }}
          onMouseLeave={() => { closeTimer.current = setTimeout(() => setActiveDropdown(null), 180); }}>
              <button style={{
              display: 'flex', alignItems: 'center', gap: 4,
              padding: '8px 14px', border: 'none', background: 'none',
              fontFamily: 'Source Sans 3', fontWeight: 500, fontSize: 14,
              color: textColor, cursor: 'pointer', borderRadius: 8,
              transition: 'all 0.15s', opacity: 0.85,
              whiteSpace: 'nowrap'
            }}
            onMouseEnter={(e) => {e.currentTarget.style.opacity = '1';e.currentTarget.style.background = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(11,22,40,0.05)';}}
            onMouseLeave={(e) => {e.currentTarget.style.opacity = '0.85';e.currentTarget.style.background = 'transparent';}}>
              
                <a href={item.sub ? '#' : item.href} onClick={e => { if(item.sub) e.preventDefault(); else window.location.href=item.href; }} style={{color:'inherit',textDecoration:'none'}}>{item.label}</a>
                {item.sub && <ChevronDown />}
              </button>
              {item.sub && activeDropdown === item.label &&
            <div style={{
              position: 'absolute', top: '100%', left: 0, minWidth: 220,
              background: '#fff', border: '1px solid #e2e8f0',
              borderRadius: 12, boxShadow: '0 12px 40px rgba(11,22,40,0.14)',
              padding: '8px 0', marginTop: 4
            }}>
                  {item.sub.map((s) =>
              <div key={s.label} style={{
                padding: '10px 20px', fontFamily: 'Source Sans 3', fontSize: 14,
                color: '#334155', cursor: 'pointer', transition: 'all 0.12s'
              }}
              onClick={() => { window.location.href = s.href; }}
              onMouseEnter={(e) => {e.currentTarget.style.background = '#f8fafc';e.currentTarget.style.color = ac.hex;}}
              onMouseLeave={(e) => {e.currentTarget.style.background = 'transparent';e.currentTarget.style.color = '#334155';}}>
                {s.label}</div>
              )}
                </div>
            }
            </div>
          )}
        </div>

        {/* CTA */}
        <button style={{
          padding: '10px 22px', background: ORANGE.main, color: '#fff',
          border: 'none', borderRadius: 10, fontFamily: 'Source Sans 3', fontWeight: 600,
          fontSize: 14, cursor: 'pointer', flexShrink: 0,
          transition: 'all 0.2s', boxShadow: `0 4px 16px rgba(${ORANGE.rgb},0.35)`
        }}
        onMouseEnter={(e) => {e.currentTarget.style.transform = 'translateY(-1px)';e.currentTarget.style.boxShadow = `0 8px 24px rgba(${ORANGE.rgb},0.45)`;}}
        onMouseLeave={(e) => {e.currentTarget.style.transform = 'none';e.currentTarget.style.boxShadow = `0 4px 16px rgba(${ORANGE.rgb},0.35)`;}}
        onClick={() => { window.location.href = 'pages/Contact.html'; }}>
          Contact Us
        </button>
      </div>
    </nav>);

}

// ——— HERO SERVICE CARD ———
function HeroServiceCard({ activeService, setActiveService, services, ac }) {
  const heroBg = 'oklch(35% 0.16 220)';
  return (
    <>
      <div className="hero-img-wrap" style={{
        position: 'relative', width: '100%', height: '100%',
        minHeight: 480, overflow: 'hidden',
      }}>
        {/* Image — slightly oversized so scale animation doesn't show edges */}
        <div className="hero-img-float" style={{ position: 'absolute', inset: '-6%', transformOrigin: 'center center' }}>
          <img
            src="uploads/AdobeStock_414961835.jpeg"
            alt="Digital transformation technology"
            onError={(e) => { e.target.style.display = 'none'; }}
            style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block', opacity: 0.9 }}
          />
        </div>

        {/* Blend gradients — all four edges */}
        <div style={{ position:'absolute',inset:0,zIndex:2,pointerEvents:'none',
          background:`linear-gradient(to right, ${heroBg} 0%, ${heroBg} 5%, rgba(11,20,44,0.7) 28%, transparent 55%)`
        }}/>
        <div style={{ position:'absolute',inset:0,zIndex:2,pointerEvents:'none',
          background:`linear-gradient(to bottom, ${heroBg} 0%, transparent 25%, transparent 70%, ${heroBg} 100%)`
        }}/>
        <div style={{ position:'absolute',top:0,right:0,bottom:0,width:'25%',zIndex:2,pointerEvents:'none',
          background:`linear-gradient(to left, ${heroBg} 0%, transparent 100%)`
        }}/>
      </div>
    </>
  );
}


// ——— HERO ———
function Hero({ variant, accent }) {
  const ac = ACCENT_COLORS[accent];
  const [activeService, setActiveService] = useState(0);

  const services = ['Data & AI', 'Cloud', 'Quality Engineering', 'Platforms & Apps', 'IT Operations'];

  useEffect(() => {
    const t = setInterval(() => setActiveService((i) => (i + 1) % services.length), 2600);
    return () => clearInterval(t);
  }, []);

  if (variant === 'precision') {
    return (
      <section style={{
        minHeight: '100vh', background: '#FAFBFD', display: 'flex', alignItems: 'center',

        paddingTop: 72, position: 'relative', overflow: 'hidden'
      }}>
        {/* Background grid */}
        <div style={{
          position: 'absolute', inset: 0, opacity: 0.035,
          backgroundImage: `linear-gradient(#0B1628 1px, transparent 1px), linear-gradient(90deg, #0B1628 1px, transparent 1px)`,
          backgroundSize: '48px 48px'
        }} />
        {/* Accent orb */}
        <div style={{
          position: 'absolute', right: -160, top: '50%', transform: 'translateY(-50%)',
          width: 680, height: 680, borderRadius: '50%',
          background: `radial-gradient(circle, ${ac.light} 0%, transparent 70%)`,
          opacity: 0.7
        }} />

        <div style={{ maxWidth: 1280, margin: '0 auto', padding: '80px 40px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 80, alignItems: 'center', width: '100%', position: 'relative', zIndex: 1 }}>
          <div>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8, padding: '6px 14px', background: ac.light, borderRadius: 100, marginBottom: 28 }}>
              <div style={{ width: 6, height: 6, borderRadius: '50%', background: ac.main }} />
              <span style={{ fontFamily: 'Source Sans 3', fontWeight: 600, fontSize: 12, letterSpacing: '0.08em', textTransform: 'uppercase', color: ac.hex }}>Engineering-Led Transformation</span>
            </div>
            <h1 style={{
              fontFamily: 'Barlow Semi Condensed', fontWeight: 800, fontSize: 'clamp(44px, 5vw, 68px)',
              lineHeight: 1.05, letterSpacing: '-0.03em', color: '#0B1628', marginBottom: 24
            }}>
              We build outcomes,<br />
              <span style={{ color: ac.main }}>not just teams.</span>
            </h1>
            <p style={{ fontFamily: 'Source Sans 3', fontSize: 18, lineHeight: 1.65, color: '#475569', maxWidth: 480, marginBottom: 40, fontWeight: 400 }}>
              Pointwest is an engineering-led solutions partner — delivering end-to-end digital transformation across Data & AI, Cloud, and enterprise technology for global organizations.
            </p>
            <div style={{ display: 'flex', gap: 16, alignItems: 'center', flexWrap: 'wrap' }}>
              <button style={{
                display: 'inline-flex', alignItems: 'center', gap: 10,
                padding: '14px 28px', background: '#0B1628', color: '#fff',
                border: 'none', borderRadius: 12, fontFamily: 'Source Sans 3', fontWeight: 600,
                fontSize: 15, cursor: 'pointer', transition: 'all 0.2s'
              }}
              onClick={() => { const el = document.getElementById('our-services'); if (el) { const top = el.getBoundingClientRect().top + window.pageYOffset - 72; window.scrollTo({ top, behavior: 'smooth' }); } }}
              onMouseEnter={(e) => {e.currentTarget.style.background = ac.main;e.currentTarget.style.transform = 'translateY(-2px)';}}
              onMouseLeave={(e) => {e.currentTarget.style.background = '#0B1628';e.currentTarget.style.transform = 'none';}}>
                Explore Our Services <ArrowRight size={18} />
              </button>
              <button style={{
                display: 'inline-flex', alignItems: 'center', gap: 8,
                padding: '14px 24px', background: 'transparent', color: '#0B1628',
                border: '1.5px solid #CBD5E1', borderRadius: 12,
                fontFamily: 'Source Sans 3', fontWeight: 500, fontSize: 15, cursor: 'pointer', transition: 'all 0.2s'
              }}
              onClick={() => { window.location.href = 'pages/Success Stories.html'; }}
              onMouseEnter={(e) => {e.currentTarget.style.borderColor = ac.hex;e.currentTarget.style.color = ac.hex;}}
              onMouseLeave={(e) => {e.currentTarget.style.borderColor = '#CBD5E1';e.currentTarget.style.color = '#0B1628';}}>
                View Success Stories
              </button>
            </div>
            <div style={{ marginTop: 52, display: 'flex', gap: 40 }}>
              {[['20+', 'Years'], ['500+', 'Engineers'], ['8', 'Industries']].map(([n, l]) =>
              <div key={l}>
                  <div style={{ fontFamily: 'Barlow Semi Condensed', fontWeight: 800, fontSize: 32, color: '#0B1628', letterSpacing: '-0.02em' }}>{n}</div>
                  <div style={{ fontFamily: 'Source Sans 3', fontSize: 13, color: '#94A3B8', fontWeight: 500, marginTop: 2 }}>{l} served</div>
                </div>
              )}
            </div>
          </div>

          {/* Right visual */}
          <div style={{ position: 'relative' }}>
            <div style={{
              background: '#fff', borderRadius: 24, border: '1px solid #E2E8F0',
              boxShadow: '0 24px 80px rgba(11,22,40,0.10)', padding: 32,
              position: 'relative', overflow: 'hidden'
            }}>
              <div style={{ marginBottom: 24 }}>
                <div style={{ fontFamily: 'Barlow Semi Condensed', fontWeight: 700, fontSize: 13, letterSpacing: '0.1em', textTransform: 'uppercase', color: '#94A3B8', marginBottom: 10 }}>Our Capabilities</div>
                {services.map((s, i) =>
                <div key={s} style={{
                  padding: '14px 16px', borderRadius: 10, marginBottom: 6,
                  background: i === activeService ? ac.light : 'transparent',
                  borderLeft: `3px solid ${i === activeService ? ac.main : 'transparent'}`,
                  transition: 'all 0.3s ease',
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between'
                }}>
                    <span style={{ fontFamily: 'Source Sans 3', fontWeight: i === activeService ? 600 : 400, fontSize: 15, color: i === activeService ? ac.hex : '#64748B' }}>{s}</span>
                    {i === activeService && <ArrowRight size={16} color={ac.hex} />}
                  </div>
                )}
              </div>
              <div style={{ height: 1, background: '#F1F5F9', margin: '16px 0' }} />
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                {['Consumer & Retail', 'Banking & Insurance', 'Healthcare', 'Public Sector'].map((ind) =>
                <div key={ind} style={{
                  padding: '10px 14px', background: '#F8FAFC', borderRadius: 8,
                  fontFamily: 'Source Sans 3', fontSize: 12, color: '#64748B', fontWeight: 500
                }}>{ind}</div>
                )}
              </div>
            </div>
            {/* floating badge */}
            <div style={{

          <span style={{ fontFamily: 'Source Sans 3', fontSize: 13, color: 'rgba(255,255,255,0.3)' }}>© 2026 Pointwest Technologies. All rights reserved.</span>
          <span style={{ fontFamily: 'Source Sans 3', fontSize: 13, color: 'rgba(255,255,255,0.3)' }}>Privacy Notice</span>
        </div>
      </div>
    </footer>);

}

// ——— APP ———
function App() {
  const saved = (() => {try {const s = localStorage.getItem('pw_tweaks');return s ? JSON.parse(s) : null;} catch {return null;}})();
  const init = { ...TWEAK_DEFAULTS, ...(saved || {}) };

  const [variant, setVariant] = useState(init.variant);
  const [accent, setAccent] = useState(init.accent);
  const [navStyle, setNavStyle] = useState(init.navStyle);

  useEffect(() => {
    try {localStorage.setItem('pw_tweaks', JSON.stringify({ variant, accent, navStyle }));} catch {}
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { variant, accent, navStyle } }, '*');
  }, [variant, accent, navStyle]);

  // expose to global tweak fns
  useEffect(() => {
    window._setVariant = setVariant;
    window._setAccent = setAccent;
    window._setNavStyle = setNavStyle;
  }, []);

  return (
    <>
      <Nav variant={variant} accent={accent} navStyle={navStyle} />
      <Hero variant={variant} accent={accent} />
      <WhySection variant={variant} accent={accent} />
      <StatsBand variant={variant} accent={accent} />
      <ServicesSection variant={variant} accent={accent} />
      <IndustriesSection variant={variant} accent={accent} />
      <InsightsSection variant={variant} accent={accent} />
      <CareersCTA variant={variant} accent={accent} />
      <Footer variant={variant} accent={accent} />
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
// Tweaks bridge
function setVariant(v) {
  document.querySelectorAll('#variant-btns .tweak-btn').forEach(b => b.classList.toggle('active', b.dataset.val === v));
  if (window._setVariant) window._setVariant(v);
  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { variant: v } }, '*');
}
function setAccent(v) {
  document.querySelectorAll('#accent-btns .tweak-btn').forEach(b => b.classList.toggle('active', b.dataset.val === v));
  if (window._setAccent) window._setAccent(v);
  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent: v } }, '*');
}
function setNav(v) {
  document.querySelectorAll('#nav-btns .tweak-btn').forEach(b => b.classList.toggle('active', b.dataset.val === v));
  if (window._setNavStyle) window._setNavStyle(v);
  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { navStyle: v } }, '*');
}
window.addEventListener('message', (e) => {
  if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('visible');
  if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');
</script>
</body>
